      {name:"主板次日溢价%",type:"line",yAxisIndex:1,data:ser.map(s=>s.main_prem==null?null:+s.main_prem.toFixed(1)),itemStyle:{color:"#5f8fef"}},
    ]});
    // 容器布局完成后再 resize 一次,避免 init 抢在布局前拿到 0 宽
    requestAnimationFrame(()=>inst.resize());
    window.addEventListener("resize",()=>inst.resize());
  }catch(e){ document.getElementById("trend").innerHTML='<div class="empty">趋势图需联网加载 ECharts</div>'; }
})();

// 机会清单
(()=>{ const el=document.getElementById("picks");
  if(!D.picks.length){ el.innerHTML='<div class="empty">今日创业板无首板涨停。</div>'; return; }
  el.innerHTML = D.picks.map((p,i)=>`
   <div class="pick ${p.score>=4?'top':''}">
     <div class="prow">
       <span class="rank">#${i+1}</span>
       <span class="pcode">${p.code}</span>
       <span class="pname">${esc(p.name)}</span>
       <span class="scorebadge ${p.score<0?'neg':''}">评分 ${p.score}</span>
       <span class="pprice">${p.price==null?"—":p.price.toFixed(2)}元</span>
     </div>
     <div class="rets">
       <div class="ret"><div class="k">周</div><div class="v">${fmtRet(p.ret_1w)}</div></div>
       <div class="ret"><div class="k">月</div><div class="v">${fmtRet(p.ret_1m)}</div></div>
       <div class="ret"><div class="k">半年</div><div class="v">${fmtRet(p.ret_6m)}</div></div>
     </div>
     <div class="nums">
       <div class="num"><span class="nk">题材</span> <b>${esc(p.theme)||"—"}</b>${p.resonance>=2?`·${p.resonance}响`:""}</div>
       <div class="num"><span class="nk">封单</span> <b>${fmtYi(p.seal_amount)}</b>${p.seal_to_float!=null?`/流通${(p.seal_to_float*100).toFixed(1)}%`:""}</div>
       <div class="num"><span class="nk">首封</span> <b>${p.first_seal_time||"—"}</b>${p.open_times?`·炸${p.open_times}`:""}</div>
       <div class="num"><span class="nk">主力</span> <b>${p.main_net==null?"—":fmtYi(p.main_net)}</b></div>
       <div class="num"><span class="nk">PE</span> <b>${fmtPe(p.pe_ttm)}</b></div>
       <div class="num"><span class="nk">换手</span> <b>${p.turnover==null?"—":p.turnover.toFixed(0)+"%"}</b></div>
     </div>
     <div class="judge">
       ${p.pros.map(x=>`<div class="jline"><span class="plus">▲</span><span>${esc(x)}</span></div>`).join("")}
       ${p.cons.map(x=>`<div class="jline"><span class="minus">▽</span><span>${esc(x)}</span></div>`).join("")}
     </div>
   </div>`).join("");
})();
</script>
</body>
</html>
