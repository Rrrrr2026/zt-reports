<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026-07-06 创业板复盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root { --red:#e23b41; --green:#1e8e3e; --bg:#10131a; --panel:#1a1f2b;
          --card:#212a3a; --ink:#e8eaf0; --muted:#8b94a5; --line:#2d3748;
          --cyb:#9b7bf0; --gold:#f7b955; }
  * { box-sizing:border-box; }
  body { margin:0; padding:22px 20px 60px; background:var(--bg); color:var(--ink);
         font-family:"PingFang SC","Microsoft YaHei",sans-serif;
         max-width:1100px; margin-inline:auto; }
  header { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
  h1 { font-size:21px; margin:0; }
  h1 .cyb { color:var(--cyb); }
  .sub { color:var(--muted); font-size:12px; }
  .datenav { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .datenav button,.datenav select { background:var(--card); color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:6px 12px; font-size:14px; cursor:pointer; }
  .datenav button:disabled { opacity:.35; cursor:default; }
  h2 { font-size:16px; margin:26px 0 12px; border-left:4px solid var(--cyb); padding-left:9px; }
  /* 择时横幅 */
  .regime { border-radius:14px; padding:16px 20px; margin-top:14px;
            display:flex; flex-wrap:wrap; align-items:center; gap:16px; }
  .regime.占优 { background:linear-gradient(135deg,#3a1f2a,#2a1f3a); border:1px solid var(--red); }
  .regime.降温 { background:linear-gradient(135deg,#16241c,#1a1f2b); border:1px solid var(--green); }
  .regime.中性 { background:var(--panel); border:1px solid var(--line); }
  .regime .tag { font-size:22px; font-weight:800; white-space:nowrap; }
  .regime.占优 .tag { color:#ff7a85; } .regime.降温 .tag { color:#5fd08a; }
  .regime .why { color:#c3cad6; font-size:13px; line-height:1.7; }
  /* 情绪卡片 */
  .cards { display:flex; flex-wrap:wrap; gap:10px; }
  .scard { background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:11px 16px; min-width:120px; }
  .scard .k { font-size:11px; color:var(--muted); } .scard .v { font-size:21px; font-weight:700; }
  .chart { background:var(--panel); border-radius:12px; margin-top:12px; }
  /* 机会卡片 */
  .pick { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:14px 16px; margin-bottom:12px; }
  .pick.top { border-color:var(--gold); box-shadow:0 0 0 1px rgba(247,185,85,.25); }
  .prow { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .rank { font-size:13px; color:var(--gold); font-weight:700; min-width:26px; }
  .pcode { color:var(--muted); font-size:12px; font-family:Menlo,monospace; }
  .pname { font-size:17px; font-weight:700; }
  .scorebadge { background:var(--cyb); color:#fff; border-radius:6px; padding:1px 9px;
                font-size:12px; font-weight:700; }
  .scorebadge.neg { background:#566; }
  .pprice { margin-left:auto; font-size:16px; font-weight:700; color:var(--red); }
  .rets { display:flex; gap:6px; margin-top:9px; }
  .ret { flex:1; background:var(--panel); border-radius:7px; padding:4px 0; text-align:center; }
  .ret .k { font-size:10px; color:var(--muted); } .ret .v { font-size:12px; font-weight:600; }
  .pos { color:var(--red); } .neg2 { color:var(--green); } .na { color:var(--muted); }
  .nums { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .num { background:var(--panel); border-radius:7px; padding:4px 9px; font-size:12px; }
  .num b { font-weight:700; } .num .nk { color:var(--muted); font-size:10px; }
  .judge { margin-top:9px; display:flex; flex-direction:column; gap:5px; }
  .jline { font-size:12px; line-height:1.55; display:flex; gap:7px; }
  .jline .plus { color:#ff9aa2; } .jline .minus { color:#7fd6a0; }
  .empty { color:var(--muted); padding:20px; background:var(--panel); border-radius:12px; }
  .hint { color:var(--muted); font-size:11px; margin-top:24px; line-height:1.8; }
</style>
</head>
<body>
<header>
  <h1><span class="cyb">创业板</span> 复盘 · 2026-07-06</h1>
  <span class="sub">20cm 首板游戏 · 机会按规则打分排序</span>
  <div class="datenav">
    <button id="prev">‹</button><select id="sel"></select><button id="next">›</button>
  </div>
</header>

<div id="regime"></div>

<h2>创业板情绪面板</h2>
<div class="cards" id="senti"></div>
<div id="trend" class="chart" style="height:260px;"></div>

<h2>20cm 首板机会清单 <span class="sub">(封单/题材共振/消息/封板质量/资金/位置 综合打分)</span></h2>
<div id="picks"></div>

<div class="hint">
  · 评分仅按规则汇总盘面与消息线索,分数高=机会信号多、风险标记少,<b>不是买入建议</b>,更不构成投资建议。<br>
  · 创业板是"首板游戏":晋级率仅约5%,赌连板基本必死;清单聚焦"首板当天/次日的一波流"逻辑。<br>
  · 涨幅为前复权区间涨幅;PE(TTM)亏损显示"亏损";趋势图需联网加载 ECharts。
</div>
<script>
const D = {"date": "2026-07-06", "regime": {"regime": "中性", "reason": "占比与溢价信号未一致/不足,保持中性(占比5%、溢价差(中位)+1.8pct)", "series": [{"date": "2026-06-23", "cyb_count": 7, "total": 94, "ratio": 0.07446808510638298, "cyb_prem": 4.450262069702148, "main_prem": 0.09099180996417999, "cyb_n": 11, "spread": 4.3592702597379684}, {"date": "2026-06-24", "cyb_count": 6, "total": 98, "ratio": 0.061224489795918366, "cyb_prem": 1.5057573318481445, "main_prem": -0.22976019233465195, "cyb_n": 7, "spread": 1.7355175241827965}, {"date": "2026-06-25", "cyb_count": 3, "total": 85, "ratio": 0.03529411764705882, "cyb_prem": 3.343134045600891, "main_prem": 1.5625144839286804, "cyb_n": 6, "spread": 1.7806195616722107}, {"date": "2026-06-26", "cyb_count": 5, "total": 60, "ratio": 0.08333333333333333, "cyb_prem": -1.748399019241333, "main_prem": -0.7473841905593872, "cyb_n": 3, "spread": null}, {"date": "2026-06-29", "cyb_count": 7, "total": 106, "ratio": 0.0660377358490566, "cyb_prem": -1.388888955116272, "main_prem": 1.4666965007781982, "cyb_n": 5, "spread": -2.85558545589447}, {"date": "2026-06-30", "cyb_count": 16, "total": 140, "ratio": 0.11428571428571428, "cyb_prem": 3.885291576385498, "main_prem": 2.110508680343628, "cyb_n": 7, "spread": 1.7747828960418701}, {"date": "2026-07-01", "cyb_count": 13, "total": 151, "ratio": 0.08609271523178808, "cyb_prem": 6.5193586349487305, "main_prem": 2.4627765417099, "cyb_n": 16, "spread": 4.056582093238831}, {"date": "2026-07-02", "cyb_count": 7, "total": 92, "ratio": 0.07608695652173914, "cyb_prem": -3.682487726211548, "main_prem": -0.8115015029907227, "cyb_n": 13, "spread": -2.870986223220825}, {"date": "2026-07-03", "cyb_count": 10, "total": 105, "ratio": 0.09523809523809523, "cyb_prem": 1.4433919191360474, "main_prem": -0.44004401564598083, "cyb_n": 7, "spread": 1.8834359347820282}, {"date": "2026-07-06", "cyb_count": 3, "total": 64, "ratio": 0.046875, "cyb_prem": -0.9191984534263611, "main_prem": -1.390268087387085, "cyb_n": 10, "spread": 0.4710696339607239}], "today": {"date": "2026-07-06", "cyb_count": 3, "total": 64, "ratio": 0.046875, "cyb_prem": -0.9191984534263611, "main_prem": -1.390268087387085, "cyb_n": 10, "spread": 0.4710696339607239}}, "senti": {"zt_count": 3, "first_board": 3, "max_lianban": 1, "zb_count": 1, "dt_count": 1, "zb_rate": 0.25, "ratio": 0.046875, "yest_avg_pct": -1.3503458606079222, "promo_rate": 0.0, "yest_n": 10}, "picks": [{"code": "301317", "name": "鑫磊股份", "price": 62.21, "theme": "中俄贸易概念", "resonance": 1, "seal_amount": 71764709.0, "seal_to_float": 0.022100770028733382, "first_seal_time": "13:06", "open_times": 0, "turnover": 12.112909317016602, "pe_ttm": -74.13, "ret_1w": 11.031787110246484, "ret_1m": -2.322222047763345, "ret_6m": 89.2089175461541, "main_net": 40141106.0, "news": null, "score": 3.0, "pros": ["封单占流通2.2%,铁板", "主力净流入0.4亿(占成交11%)"], "cons": ["中俄贸易概念仅此1只,题材辨识度弱", "无明确消息,纯情绪/资金驱动"]}, {"code": "301191", "name": "菲菱科思", "price": 135.01, "theme": "华为概念", "resonance": 2, "seal_amount": 127660460.0, "seal_to_float": 0.012942681678762155, "first_seal_time": "13:39", "open_times": 0, "turnover": 18.902069091796875, "pe_ttm": 178.26, "ret_1w": 39.18556701030926, "ret_1m": 39.04652048981945, "ret_6m": 71.81872558127695, "main_net": 207426256.0, "news": null, "score": 3.0, "pros": ["封单占流通1.3%,较扎实", "华为概念双响,题材成立", "主力净流入2.1亿(占成交12%)"], "cons": ["无明确消息,纯情绪/资金驱动"]}, {"code": "300684", "name": "中石科技", "price": 74.41, "theme": "华为概念", "resonance": 2, "seal_amount": 10354895.0, "seal_to_float": 0.0006811450156871273, "first_seal_time": "09:50", "open_times": 10, "turnover": 22.7941951751709, "pe_ttm": 65.24, "ret_1w": 32.75646743978591, "ret_1m": 31.234567901234556, "ret_6m": 52.06506856313735, "main_net": 294241808.0, "news": null, "score": -0.5, "pros": ["华为概念双响,题材成立", "主力净流入2.9亿(占成交9%)"], "cons": ["封单仅占流通0.07%,偏薄", "无明确消息,纯情绪/资金驱动", "炸板10次,20cm反复=天地板风险"]}], "all_dates": ["2026-06-05", "2026-06-08", "2026-06-09", "2026-06-10", "2026-06-11", "2026-06-12", "2026-06-15", "2026-06-16", "2026-06-17", "2026-06-18", "2026-06-22", "2026-06-23", "2026-06-24", "2026-06-25", "2026-06-26", "2026-06-29", "2026-06-30", "2026-07-01", "2026-07-02", "2026-07-03", "2026-07-06", "2026-07-07", "2026-07-08", "2026-07-09", "2026-07-10", "2026-07-13", "2026-07-14", "2026-07-16", "2026-07-17", "2026-07-20", "2026-07-21", "2026-07-22", "2026-07-23"]};
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtYi = v => v==null?"—":(v/1e8).toFixed(1)+"亿";
const fmtRet = v => v==null?'<span class="na">—</span>':`<span class="${v>=0?'pos':'neg2'}">${v>=0?'+':''}${v.toFixed(0)}%</span>`;
const fmtPct = v => v==null?"—":(v*100).toFixed(0)+"%";
const fmtPe = v => v==null?"—":(v<0?"亏损":v.toFixed(1));

// 日期切换
(()=>{ const sel=document.getElementById("sel"), ds=D.all_dates;
  sel.innerHTML=ds.map(d=>`<option ${d===D.date?"selected":""}>${d}</option>`).join("");
  const go=d=>{ if(d&&d!==D.date) location.href=encodeURIComponent(`${d}_创业板.html`); };
  sel.onchange=()=>go(sel.value);
  const i=ds.indexOf(D.date), p=document.getElementById("prev"), n=document.getElementById("next");
  p.disabled=i<=0; n.disabled=i<0||i>=ds.length-1;
  p.onclick=()=>go(ds[i-1]); n.onclick=()=>go(ds[i+1]);
})();

// 择时横幅
(()=>{ const r=D.regime, cls=r.regime.includes("占优")?"占优":r.regime.includes("降温")?"降温":"中性";
  document.getElementById("regime").innerHTML =
    `<div class="regime ${cls}"><div class="tag">${esc(r.regime)}</div>
     <div class="why">${esc(r.reason).split(";").map(x=>"· "+x).join("<br>")}</div></div>`;
})();

// 情绪卡片
(()=>{ const s=D.senti;
  const cards=[
    ["创业板涨停",`${s.zt_count}只`],
    ["其中首板",`${s.first_board}只`],
    ["占全市场涨停",fmtPct(s.ratio)],
    ["炸板率",s.zb_rate==null?"—":fmtPct(s.zb_rate)+" ⚠"],
    ["跌停",`${s.dt_count}只`],
    ["昨涨停次日均涨",s.yest_avg_pct==null?"—":(s.yest_avg_pct>=0?"+":"")+s.yest_avg_pct.toFixed(1)+"%"],
    ["晋级率",s.promo_rate==null?"—":fmtPct(s.promo_rate)],
  ];
  document.getElementById("senti").innerHTML=cards.map(c=>
    `<div class="scard"><div class="k">${c[0]}</div><div class="v">${c[1]}</div></div>`).join("");
})();

// 趋势图:占比 + 创业板/主板溢价
(()=>{ const ser=D.regime.series;
  try{ const inst=echarts.init(document.getElementById("trend")); inst.setOption({
    tooltip:{trigger:"axis"}, legend:{data:["创业板涨停占比%","创业板次日溢价%","主板次日溢价%"],textStyle:{color:"#8b94a5"}},
    grid:{left:44,right:30,top:34,bottom:24},
    xAxis:{type:"category",data:ser.map(s=>s.date.slice(5)),axisLabel:{color:"#8b94a5"}},
    yAxis:[{type:"value",name:"占比%",axisLabel:{color:"#8b94a5"}},{type:"value",name:"溢价%",axisLabel:{color:"#8b94a5"}}],
    series:[
      {name:"创业板涨停占比%",type:"bar",data:ser.map(s=>+(s.ratio*100).toFixed(1)),itemStyle:{color:"#9b7bf0"}},
      {name:"创业板次日溢价%",type:"line",yAxisIndex:1,data:ser.map(s=>s.cyb_prem==null?null:+s.cyb_prem.toFixed(1)),itemStyle:{color:"#f7b955"}},
      {name:"主板次日溢价%",type:"line",yAxisIndex:1,data:ser.map(s=>s.main_prem==null?null:+s.main_prem.toFixed(1)),itemStyle:{color:"#5f8fef"}},
    ]});
    // 容器布局完成后再 resize 一次,避免 init 抢在布局前拿到 0 宽
    requestAnimationFrame(()=>inst.resize());
    window.addEventListener("resize",()=>inst.resize());
  }catch(e){ document.getElementById("trend").innerHTML='<div class="empty">趋势图需联网加载 ECharts</div>'; }
})();

// 机会清单
(()=>{ const el=document.getElementById("picks");
  if(!D.picks.length){ el.innerHTML='<div class="empty">今日创业板无首板涨停。</div>'; return; }
  el.innerHTML = D.picks.map((p,i)=>`
   <div class="pick ${p.score>=4?'top':''}">
     <div class="prow">
       <span class="rank">#${i+1}</span>
       <span class="pcode">${p.code}</span>
       <span class="pname">${esc(p.name)}</span>
       <span class="scorebadge ${p.score<0?'neg':''}">评分 ${p.score}</span>
       <span class="pprice">${p.price==null?"—":p.price.toFixed(2)}元</span>
     </div>
     <div class="rets">
       <div class="ret"><div class="k">周</div><div class="v">${fmtRet(p.ret_1w)}</div></div>
       <div class="ret"><div class="k">月</div><div class="v">${fmtRet(p.ret_1m)}</div></div>
       <div class="ret"><div class="k">半年</div><div class="v">${fmtRet(p.ret_6m)}</div></div>
     </div>
     <div class="nums">
       <div class="num"><span class="nk">题材</span> <b>${esc(p.theme)||"—"}</b>${p.resonance>=2?`·${p.resonance}响`:""}</div>
       <div class="num"><span class="nk">封单</span> <b>${fmtYi(p.seal_amount)}</b>${p.seal_to_float!=null?`/流通${(p.seal_to_float*100).toFixed(1)}%`:""}</div>
       <div class="num"><span class="nk">首封</span> <b>${p.first_seal_time||"—"}</b>${p.open_times?`·炸${p.open_times}`:""}</div>
       <div class="num"><span class="nk">主力</span> <b>${p.main_net==null?"—":fmtYi(p.main_net)}</b></div>
       <div class="num"><span class="nk">PE</span> <b>${fmtPe(p.pe_ttm)}</b></div>
       <div class="num"><span class="nk">换手</span> <b>${p.turnover==null?"—":p.turnover.toFixed(0)+"%"}</b></div>
     </div>
     <div class="judge">
       ${p.pros.map(x=>`<div class="jline"><span class="plus">▲</span><span>${esc(x)}</span></div>`).join("")}
       ${p.cons.map(x=>`<div class="jline"><span class="minus">▽</span><span>${esc(x)}</span></div>`).join("")}
     </div>
   </div>`).join("");
})();
</script>
</body>
</html>
