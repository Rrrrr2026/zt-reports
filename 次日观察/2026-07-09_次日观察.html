 cards.push(["总命中率",o.rate==null?"—":pct(o.rate),`n=${o.n}`]);
 for(const k in hr.by_kind){const b=hr.by_kind[k];cards.push([b.cn,pct(b.rate),`${b.hit}/${b.n}`]);}
 document.getElementById("score").innerHTML=cards.map(c=>
   `<div class="sc"><div class="k">${c[0]}</div><div class="v">${c[1]}</div><div class="n">${c[2]}</div></div>`).join("")
   || '<div class="empty">尚无已验证假设</div>';})();

function card(h){return `<div class="h ${h.outcome}">
  <div class="top"><span class="tag">${esc(D.kindCn[h.kind]||h.kind)}</span>
    <b>${esc(h.name)}</b>
    <span class="res ${h.outcome}">${RES[h.outcome]||h.outcome}${h.detail?(" · "+esc(h.detail)):""}</span></div>
  <div class="hyp">${esc(h.hyp)}</div>
  <div class="basis">${esc(h.basis)}</div>
  <div class="prior">先验命中概率 ${pct(h.prior)}</div></div>`;}

document.getElementById("validated").innerHTML = D.validated.length
  ? D.validated.map(card).join("") : '<div class="empty">无(这是库内首日,昨天没有生成假设)</div>';
document.getElementById("tmrLabel").textContent = D.target_date?`(目标日 ${D.target_date})`:"";
document.getElementById("tomorrow").innerHTML = D.tomorrow.length
  ? D.tomorrow.map(card).join("") : '<div class="empty">今日无主线题材,未生成假设</div>';

document.getElementById("mom").innerHTML =
  "<tr><th>题材</th><th>涨停(昨)</th><th>连续</th><th>最高板</th><th>炸板</th><th>阶段</th><th>动量</th><th>龙头</th></tr>"
  + D.momentum.map(m=>{const ar=m.delta>0?'<span class="up">↑</span>':(m.delta<0?'<span class="dn">↓</span>':"→");
    return `<tr><td>${esc(m.theme)}</td><td>${m.zt}(${m.prev})${ar}</td><td>${m.streak}天</td><td>${m.maxlb}板</td><td>${m.zb}</td><td>${esc(m.stage)}</td><td>${m.mom}</td><td>${esc(m.leader)}</td></tr>`;}).join("");

// 策略自适应表(各规律 × 环境 的学到胜率)
(()=>{
  const A = D.adaptive || [];
  const vcls = v => v==="失效降级"?"miss":(v==="有效"?"hit":"");
  document.getElementById("adaptive").innerHTML = A.length
    ? "<tr><th>规律</th><th>环境</th><th>命中/样本</th><th>胜率</th><th>评定</th></tr>"
      + A.map(a=>`<tr><td>${esc(a.cn)}</td><td>${esc(a.regime)}</td><td>${a.hit}/${a.n}</td>
        <td>${(a.rate*100).toFixed(0)}%</td><td class="${vcls(a.verdict)}">${esc(a.verdict)}</td></tr>`).join("")
    : '<tr><td class="empty" style="background:none">尚无已验证样本可学习</td></tr>';
})();

// 题材四象限散点图
(()=>{
  const Q = D.quadrant || [];
  // 四个象限的含义(资金行为):右上=主升,左上=高位分歧,右下=新发酵,左下=退潮
  const STAGE_COLOR = {"主升期":"#e23b41","发酵期":"#f7b955","分歧期":"#9b7bf0","退潮期":"#5fd08a","活跃":"#5f8fef"};
  const ymax = Math.max(3, ...Q.map(q=>q.y)) + 0.5;
  const xabs = Math.max(3, ...Q.map(q=>Math.abs(q.x))) + 1;
  const yMid = 2.5;  // 高/低板分界
  document.getElementById("qlegend").innerHTML =
    '<span class="qchip" style="border-color:#e23b41">右上·主升主线(强且加速,核心)</span>'
   +'<span class="qchip" style="border-color:#9b7bf0">左上·高位分歧(强但退烧,警惕)</span>'
   +'<span class="qchip" style="border-color:#f7b955">右下·新发酵卡位(弱但升温,低吸)</span>'
   +'<span class="qchip" style="border-color:#5fd08a">左下·退潮冷门(弱且降温,回避)</span>';
  try{
    const inst = echarts.init(document.getElementById("quad"));
    inst.setOption({
      grid:{left:50,right:30,top:30,bottom:46},
      tooltip:{formatter:p=>`${esc(p.data.theme)}<br>动量Δ ${p.data.x>=0?'+':''}${p.data.x} · 最高${p.data.y}板<br>涨停${p.data.size}家 · ${esc(p.data.stage)}<br>龙头:${esc(p.data.leader)||'—'}`},
      xAxis:{type:"value",name:"动量(Δ涨停数,昨→今)",nameLocation:"middle",nameGap:28,
        min:-xabs,max:xabs,axisLabel:{color:"#8b94a5"},splitLine:{show:false},
        axisLine:{lineStyle:{color:"#2d3748"}}},
      yAxis:{type:"value",name:"强度(最高连板)",min:0,max:ymax,axisLabel:{color:"#8b94a5"},
        splitLine:{show:false},axisLine:{lineStyle:{color:"#2d3748"}}},
      series:[{
        type:"scatter",
        symbolSize:d=>Math.max(14, Math.min(60, d.size*3)),
        data:Q.map(q=>({value:[q.x,q.y],...q,itemStyle:{color:(STAGE_COLOR[q.stage]||"#5f8fef"),opacity:0.8}})),
        label:{show:true,formatter:p=>esc(p.data.theme),position:"top",color:"#c3cad6",fontSize:11},
        markLine:{silent:true,symbol:"none",lineStyle:{color:"#3a4456",type:"dashed"},
          data:[{xAxis:0},{yAxis:yMid}]},
      }],
    });
    requestAnimationFrame(()=>inst.resize());
    window.addEventListener("resize",()=>inst.resize());
  }catch(e){ document.getElementById("quad").innerHTML='<div class="empty">四象限图需联网加载 ECharts</div>'; }
})();
</script></body></html>
