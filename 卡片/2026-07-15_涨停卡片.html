<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026-07-15 涨停卡片复盘</title>
<style>
  :root { --red:#e23b41; --green:#1e8e3e; --bg:#11151c; --panel:#1a2029;
          --card:#212936; --ink:#e8eaf0; --muted:#8b94a5; --line:#2d3645; }
  * { box-sizing:border-box; }
  body { margin:0; padding:20px 0 60px; background:var(--bg); color:var(--ink);
         font-family:"PingFang SC","Microsoft YaHei",sans-serif; }
  header { padding:0 24px 14px; display:flex; flex-wrap:wrap; align-items:center; gap:14px; }
  h1 { font-size:20px; margin:0; }
  .sub { color:var(--muted); font-size:12px; }
  .datenav { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .datenav button, .datenav select {
    background:var(--card); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:6px 12px; font-size:14px; cursor:pointer; }
  .datenav button:disabled { opacity:.35; cursor:default; }
  .group { margin-top:18px; }
  .ghead { display:flex; align-items:baseline; gap:12px; padding:0 24px 8px; }
  .gname { font-size:16px; font-weight:700; }
  .gname .rank { color:var(--red); font-size:13px; margin-right:6px; }
  .gmeta { color:var(--muted); font-size:12px; }
  .row { display:flex; gap:14px; overflow-x:auto; padding:4px 24px 14px;
         scroll-snap-type:x proximity; align-items:flex-start; }
  .row::-webkit-scrollbar { height:8px; }
  .row::-webkit-scrollbar-thumb { background:var(--line); border-radius:4px; }
  .card { flex:0 0 400px; scroll-snap-align:start; background:var(--card);
          border:1px solid var(--line); border-radius:14px; padding:14px 16px;
          display:flex; flex-direction:column; gap:9px; }
  .l1 { display:flex; align-items:baseline; gap:10px; }
  .code { color:var(--muted); font-size:12px; font-family:Menlo,monospace; }
  .name { font-size:17px; font-weight:700; }
  .price { margin-left:auto; font-size:17px; font-weight:700; color:var(--red); }
  .price small { font-size:11px; color:var(--muted); font-weight:400; }
  .lb { background:var(--red); color:#fff; border-radius:6px; padding:1px 8px;
        font-size:12px; font-weight:700; white-space:nowrap; }
  .lb.first { background:#3a4456; }
  .rets { display:flex; gap:6px; }
  .ret { flex:1; background:var(--panel); border-radius:8px; padding:5px 0;
         text-align:center; }
  .ret .k { font-size:10px; color:var(--muted); }
  .ret .v { font-size:13px; font-weight:600; }
  .pos { color:var(--red); } .neg { color:var(--green); } .na { color:var(--muted); }
  .tags { display:flex; flex-wrap:wrap; gap:5px; }
  .tag { font-size:11px; border-radius:5px; padding:2px 7px; background:var(--panel);
         color:var(--muted); border:1px solid var(--line); }
  .tag.ind { color:#7aa5f7; border-color:#2c4a86; }
  .nums { display:flex; gap:6px; }
  .num { flex:1; background:var(--panel); border-radius:8px; padding:5px 8px; }
  .num .k { font-size:10px; color:var(--muted); }
  .num .v { font-size:13px; font-weight:600; }
  .reason { font-size:12px; line-height:1.65; color:#c3cad6; background:var(--panel);
            border-left:3px solid var(--red); border-radius:0 8px 8px 0;
            padding:7px 10px; }
  .driver { font-size:12px; line-height:1.65; color:#e8d9b0; background:var(--panel);
            border-left:3px solid #f7b955; border-radius:0 8px 8px 0;
            padding:7px 10px; }
  .driver b { color:#f7b955; font-weight:600; }
  details.ana { background:var(--panel); border-radius:8px; }
  details.ana summary { cursor:pointer; font-size:12px; color:#7aa5f7;
            padding:7px 10px; user-select:none; list-style:none; }
  details.ana summary::before { content:"▸ "; }
  details.ana[open] summary::before { content:"▾ "; }
  .ana-body { padding:0 10px 9px; display:flex; flex-direction:column; gap:6px; }
  .ana-line { display:flex; gap:8px; font-size:12px; line-height:1.6; }
  .ana-line .ak { flex:0 0 34px; color:var(--muted); background:var(--card);
            border-radius:4px; text-align:center; height:fit-content; padding:1px 0; }
  .ana-line .av { color:#c3cad6; }
  .hint { color:var(--muted); font-size:11px; padding:0 24px; margin-top:26px; line-height:1.8; }
</style>
</head>
<body>
<header>
  <h1>2026-07-15 涨停卡片复盘</h1>
  <span class="sub">共 0 家封死涨停 · 板块按总成交额排序 · 行内左右滑动</span>
  <div class="datenav">
    <button id="prevBtn" title="上一交易日">‹</button>
    <select id="dateSel"></select>
    <button id="nextBtn" title="下一交易日">›</button>
  </div>
</header>
<div id="app"></div>
<div class="hint">
  · 涨幅为前复权区间涨幅(周=7个日历日,月=30,半年=182,年=365);PE(TTM) 为亏损时显示"亏损"。<br>
  · "涨停归因"与"个股分析"由系统按 题材共振/封板行为/位置/资金/历史 规则自动生成,仅为复盘线索,不构成投资建议。
</div>
<script>
const D = {"date": "2026-07-15", "groups": [], "all_dates": ["2026-06-05", "2026-06-08", "2026-06-09", "2026-06-10", "2026-06-11", "2026-06-12", "2026-06-15", "2026-06-16", "2026-06-17", "2026-06-18", "2026-06-22", "2026-06-23", "2026-06-24", "2026-06-25", "2026-06-26", "2026-06-29", "2026-06-30", "2026-07-01", "2026-07-02", "2026-07-03", "2026-07-06", "2026-07-07", "2026-07-08", "2026-07-09", "2026-07-10", "2026-07-13", "2026-07-14"], "total_zt": 0, "has_snapshot": false};
const fmtYi = v => v==null ? "—" : (v/1e8).toFixed(1)+"亿";
const fmtRet = v => v==null ? '<span class="na">—</span>'
  : `<span class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${v.toFixed(0)}%</span>`;
const fmtPe = v => v==null ? "—" : (v<0 ? "亏损" : v.toFixed(1));
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ---------- 日期切换 ----------
(() => {
  const sel = document.getElementById("dateSel");
  const dates = D.all_dates;
  sel.innerHTML = dates.map(d=>`<option value="${d}" ${d===D.date?"selected":""}>${d}</option>`).join("");
  const goto = d => { if (d && d!==D.date) location.href = encodeURIComponent(`${d}_涨停卡片.html`); };
  sel.onchange = () => goto(sel.value);
  const i = dates.indexOf(D.date);
  const prev = document.getElementById("prevBtn"), next = document.getElementById("nextBtn");
  prev.disabled = i <= 0; next.disabled = i < 0 || i >= dates.length-1;
  prev.onclick = () => goto(dates[i-1]);
  next.onclick = () => goto(dates[i+1]);
})();

// ---------- 卡片墙 ----------
document.getElementById("app").innerHTML = D.groups.map((g,i)=>`
<div class="group">
  <div class="ghead">
    <span class="gname"><span class="rank">#${i+1}</span>${esc(g.theme)}</span>
    <span class="gmeta">本组${g.stocks.length}只 · 板块成交 ${fmtYi(g.total_amount)} · 最高${g.max_lianban}板</span>
  </div>
  <div class="row">${g.stocks.map(s=>`
    <div class="card">
      <div class="l1">
        <span class="code">${s.code}</span>
        <span class="name">${esc(s.name)}</span>
        <span class="lb ${s.lianban>1?'':'first'}">${s.lianban>1?s.lianban+"连板":"首板"}${s.zt_stat?` ${s.zt_stat}`:""}</span>
        <span class="price">${s.price==null?"—":s.price.toFixed(2)}<small> 元</small></span>
      </div>
      <div class="rets">
        <div class="ret"><div class="k">近一周</div><div class="v">${fmtRet(s.ret_1w)}</div></div>
        <div class="ret"><div class="k">近一月</div><div class="v">${fmtRet(s.ret_1m)}</div></div>
        <div class="ret"><div class="k">近半年</div><div class="v">${fmtRet(s.ret_6m)}</div></div>
        <div class="ret"><div class="k">近一年</div><div class="v">${fmtRet(s.ret_1y)}</div></div>
      </div>
      <div class="tags">
        <span class="tag ind">${esc(s.industry)||"—"}</span>
        ${s.themes.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}
      </div>
      <div class="nums">
        <div class="num"><div class="k">PE(TTM)</div><div class="v">${fmtPe(s.pe_ttm)}</div></div>
        <div class="num"><div class="k">成交额</div><div class="v">${fmtYi(s.amount)}</div></div>
        <div class="num"><div class="k">封单</div><div class="v">${fmtYi(s.seal)}</div></div>
        <div class="num"><div class="k">主力净流入</div><div class="v">${s.main_net==null?"—":fmtYi(s.main_net)}</div></div>
      </div>
      <div class="reason">${esc(s.reason)||"—"}</div>
      <div class="driver"><b>驱动</b> ${esc(s.driver)}</div>
      ${s.analysis && s.analysis.length ? `
      <details class="ana">
        <summary>个股分析(${s.analysis.length}条)</summary>
        <div class="ana-body">
          ${s.analysis.map(a=>`<div class="ana-line"><span class="ak">${a.k}</span><span class="av">${esc(a.v)}</span></div>`).join("")}
        </div>
      </details>` : ""}
    </div>`).join("")}
  </div>
</div>`).join("");
</script>
</body>
</html>
