const fmtPe = v => v==null ? "—" : (v<0 ? "亏损" : v.toFixed(1));
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ---------- 日期切换 ----------
(() => {
  const sel = document.getElementById("dateSel");
  const dates = D.all_dates;
  sel.innerHTML = dates.map(d=>`<option value="${d}" ${d===D.date?"selected":""}>${d}</option>`).join("");
  const goto = d => { if (d && d!==D.date) location.href = encodeURIComponent(`${d}_涨停卡片.html`); };
  sel.onchange = () => goto(sel.value);
  const i = dates.indexOf(D.date);
  const prev = document.getElementById("prevBtn"), next = document.getElementById("nextBtn");
  prev.disabled = i <= 0; next.disabled = i < 0 || i >= dates.length-1;
  prev.onclick = () => goto(dates[i-1]);
  next.onclick = () => goto(dates[i+1]);
})();

// ---------- 卡片墙 ----------
document.getElementById("app").innerHTML = D.groups.map((g,i)=>`
<div class="group">
  <div class="ghead">
    <span class="gname"><span class="rank">#${i+1}</span>${esc(g.theme)}</span>
    <span class="gmeta">本组${g.stocks.length}只 · 板块成交 ${fmtYi(g.total_amount)} · 最高${g.max_lianban}板</span>
  </div>
  <div class="row">${g.stocks.map(s=>`
    <div class="card">
      <div class="l1">
        <span class="code">${s.code}</span>
        <span class="name">${esc(s.name)}</span>
        <span class="lb ${s.lianban>1?'':'first'}">${s.lianban>1?s.lianban+"连板":"首板"}${s.zt_stat?` ${s.zt_stat}`:""}</span>
        <span class="price">${s.price==null?"—":s.price.toFixed(2)}<small> 元</small></span>
      </div>
      <div class="rets">
        <div class="ret"><div class="k">近一周</div><div class="v">${fmtRet(s.ret_1w)}</div></div>
        <div class="ret"><div class="k">近一月</div><div class="v">${fmtRet(s.ret_1m)}</div></div>
        <div class="ret"><div class="k">近半年</div><div class="v">${fmtRet(s.ret_6m)}</div></div>
        <div class="ret"><div class="k">近一年</div><div class="v">${fmtRet(s.ret_1y)}</div></div>
      </div>
      <div class="tags">
        <span class="tag ind">${esc(s.industry)||"—"}</span>
        ${s.themes.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}
      </div>
      <div class="nums">
        <div class="num"><div class="k">PE(TTM)</div><div class="v">${fmtPe(s.pe_ttm)}</div></div>
        <div class="num"><div class="k">成交额</div><div class="v">${fmtYi(s.amount)}</div></div>
        <div class="num"><div class="k">封单</div><div class="v">${fmtYi(s.seal)}</div></div>
        <div class="num"><div class="k">主力净流入</div><div class="v">${s.main_net==null?"—":fmtYi(s.main_net)}</div></div>
      </div>
      <div class="reason">${esc(s.reason)||"—"}</div>
      <div class="driver"><b>驱动</b> ${esc(s.driver)}</div>
      ${s.analysis && s.analysis.length ? `
      <details class="ana">
        <summary>个股分析(${s.analysis.length}条)</summary>
        <div class="ana-body">
          ${s.analysis.map(a=>`<div class="ana-line"><span class="ak">${a.k}</span><span class="av">${esc(a.v)}</span></div>`).join("")}
        </div>
      </details>` : ""}
    </div>`).join("")}
  </div>
</div>`).join("");
</script>
</body>
</html>
