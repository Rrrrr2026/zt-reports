  if (cur==null || prev==null) return "";

  return `<span class="delta ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(d).toFixed(1).replace(/\.0$/,'')}</span>`;
};

function sortable(id, cols, rows){
  const el = document.getElementById(id);
  let sortKey = null, asc = false;
  function render(){
    const data = sortKey ? rows.slice().sort((a,b)=>{
      const x=a[sortKey], y=b[sortKey];
      if(x==null) return 1; if(y==null) return -1;
      return (typeof x==="number" ? x-y : String(x).localeCompare(String(y))) * (asc?1:-1);
    }) : rows;
    el.innerHTML = "<tr>"+cols.map(c=>`<th data-k="${c[0]}">${c[1]}${sortKey===c[0]?(asc?" ▲":" ▼"):""}</th>`).join("")+"</tr>"
      + data.map(r=>"<tr>"+cols.map(c=>`<td>${r[c[0]]??"—"}</td>`).join("")+"</tr>").join("");
    el.querySelectorAll("th").forEach(th=>th.onclick=()=>{
      const k = th.dataset.k;
      if (sortKey===k) asc=!asc; else { sortKey=k; asc=false; }
      render();
    });
  }
  render();
}
