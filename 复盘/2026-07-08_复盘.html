// ---------- 工具 ----------
const fmt = (v, suf="") => v==null ? "—" : v + suf;
const pct = v => v==null ? "—" : (v*100).toFixed(1)+"%";
const delta = (cur, prev, inv) => {
  if (cur==null || prev==null) return "";
  const d = cur - prev; if (!d) return "";
  const up = d > 0;
  return `<span class="delta ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(d).toFixed(1).replace(/\.0$/,'')}</span>`;
};

// ---------- 标题与周期 ----------
document.getElementById("phase").textContent = D.senti.phase || "";
document.getElementById("reason").innerHTML = (D.senti.reason||"").split(";").map(r=>"· "+r).join("<br>");

// ---------- 情绪卡片 ----------
const cards = [
  ["涨停", fmt(D.senti.zt,"家"), delta(D.senti.zt, D.prev.zt)],
  ["跌停", fmt(D.senti.dt,"家"), delta(D.senti.dt, D.prev.dt)],
  ["炸板率", pct(D.senti.zbRate), delta(D.senti.zbRate==null?null:D.senti.zbRate*100, D.prev.zbRate==null?null:D.prev.zbRate*100)],
  ["连板高度", fmt(D.senti.maxLb,"板"), delta(D.senti.maxLb, D.prev.maxLb)],
  ["两市成交", D.senti.amount==null?"缺失":(D.senti.amount/10000>=1?(D.senti.amount/10000).toFixed(2)+"万亿":D.senti.amount+"亿"), ""],
  ["昨涨停溢价", D.senti.prem==null?"—":D.senti.prem.toFixed(2)+"%", delta(D.senti.prem, D.prev.prem)],
  ["总晋级率", pct(D.senti.promo), ""],
  ["涨/跌家数", fmt(D.senti.up)+"/"+fmt(D.senti.down), ""],
];
document.getElementById("cards").innerHTML = cards.map(c=>
  `<div class="card"><div class="t">${c[0]}</div><div class="v">${c[1]}${c[2]}</div></div>`).join("");

// ---------- 近10日情绪趋势 ----------
function chart(id, opt){ try{ echarts.init(document.getElementById(id)).setOption(opt);}catch(e){
  document.getElementById(id).innerHTML = '<div class="note" style="padding:20px">图表加载失败(需联网加载 ECharts CDN)</div>';}}
chart("trend", {
  tooltip:{trigger:"axis"}, legend:{data:["涨停","跌停","炸板率%","连板高度"]},
  grid:{left:40,right:40,top:36,bottom:24},
  xAxis:{type:"category",data:D.hist.map(h=>h.d)},
  yAxis:[{type:"value",name:"家数"},{type:"value",name:"%/板",max:v=>Math.max(40,v.max)}],
  series:[
    {name:"涨停",type:"bar",data:D.hist.map(h=>h.zt),itemStyle:{color:"#d93025"}},
    {name:"跌停",type:"bar",data:D.hist.map(h=>h.dt),itemStyle:{color:"#1e8e3e"}},
    {name:"炸板率%",type:"line",yAxisIndex:1,data:D.hist.map(h=>h.zbRate),itemStyle:{color:"#f9ab00"}},
    {name:"连板高度",type:"line",yAxisIndex:1,data:D.hist.map(h=>h.maxLb),itemStyle:{color:"#4285f4"}},
  ]});

// ---------- 题材树状图 ----------
chart("themeChart", {
  tooltip:{formatter:p=>`${p.name}<br>涨停${p.value}家`},
  series:[{type:"treemap",roam:false,nodeClick:false,breadcrumb:{show:false},
    label:{formatter:p=>`${p.name}\n${p.value}家`},

document.getElementById("ladder").innerHTML = D.ladder.map(t=>{

  return `<div class="ladder-tier"><div class="lb-badge ${t.lb<2?'low':''}">${t.lb}板<br><span style="font-size:11px">${t.stocks.length}家</span></div><div>${chips}</div></div>`;

function sortable(id, cols, rows){
  const el = document.getElementById(id);
  let sortKey = null, asc = false;
  function render(){
    const data = sortKey ? rows.slice().sort((a,b)=>{
      const x=a[sortKey], y=b[sortKey];
      if(x==null) return 1; if(y==null) return -1;
      return (typeof x==="number" ? x-y : String(x).localeCompare(String(y))) * (asc?1:-1);
    }) : rows;
    el.innerHTML = "<tr>"+cols.map(c=>`<th data-k="${c[0]}">${c[1]}${sortKey===c[0]?(asc?" ▲":" ▼"):""}</th>`).join("")+"</tr>"
      + data.map(r=>"<tr>"+cols.map(c=>`<td>${r[c[0]]??"—"}</td>`).join("")+"</tr>").join("");
    el.querySelectorAll("th").forEach(th=>th.onclick=()=>{
      const k = th.dataset.k;
      if (sortKey===k) asc=!asc; else { sortKey=k; asc=false; }
      render();
    });
  }
  render();
}
