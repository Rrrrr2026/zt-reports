<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>2026-07-15 涨停复盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root { --red:#d93025; --green:#1e8e3e; --bg:#f6f7f9; --card:#fff; --ink:#202124; --muted:#5f6368; }
  * { box-sizing:border-box; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--ink); margin:0; padding:24px; }
  h1 { font-size:22px; } h2 { font-size:17px; margin:28px 0 12px; border-left:4px solid var(--red); padding-left:8px; }
  .cards { display:flex; flex-wrap:wrap; gap:12px; }
  .card { background:var(--card); border-radius:10px; padding:14px 18px; min-width:130px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .card .v { font-size:24px; font-weight:700; } .card .t { font-size:12px; color:var(--muted); }
  .card .delta { font-size:12px; margin-left:4px; }
  .up { color:var(--red);} .dn { color:var(--green);}
  .phase { display:inline-block; background:var(--red); color:#fff; border-radius:6px; padding:2px 10px; font-size:14px; }
  .reason { color:var(--muted); font-size:13px; line-height:1.8; }
  .chart { background:var(--card); border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-top:10px; }
  table { border-collapse:collapse; width:100%; background:var(--card); font-size:13px; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08);}
  th { background:#eef1f4; cursor:pointer; user-select:none; white-space:nowrap; }
  th, td { padding:7px 10px; border-bottom:1px solid #eee; text-align:left; }
  tr:hover td { background:#fafbfc; }
  .tag { display:inline-block; background:#fce8e6; color:var(--red); border-radius:4px; padding:1px 6px; font-size:12px; margin-right:4px; }
  .ladder-tier { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .lb-badge { background:var(--red); color:#fff; min-width:52px; text-align:center; border-radius:8px; padding:8px 4px; font-weight:700; }
  .lb-badge.low { background:#e8eaed; color:var(--ink); }
  .stock-chip { display:inline-block; background:var(--card); border:1px solid #e0e0e0; border-radius:8px; padding:5px 10px; margin:3px; font-size:13px; }
  .stock-chip b { color:var(--red); }
  .chip-sub { color:var(--muted); font-size:11px; }
  .warn { background:#fef7e0; border-radius:8px; padding:10px 14px; font-size:13px; }
  .note { color:var(--muted); font-size:12px; }
  .missing { background:#fce8e6; border-radius:8px; padding:8px 12px; font-size:12px; margin-top:6px;}
</style>
</head>
<body>

<h2>六、明日关注 <span class="note">(复盘观察清单,不构成投资建议)</span></h2>
<table id="watchTable"></table>

<h2>七、数据附表</h2>

esolutionError(\"HTTPSConnection(host='push2ex.eastmoney.com', port=443): Failed to resolve 'push2ex.eastmoney.com' ([Errno 8] nodename nor servname provided, or not known)\"))"}, "zt_pool": {"status": "failed", "message": "HTTPSConnectionPool(host='push2ex.eastmoney.com', port=443): Max retries exceeded with url: /getTopicZTPool?ut=7eea3edcaed734bea9cbfc24409ed989&dpt=wz.ztzt&Pageindex=0&pagesize=10000&sort=fbt%3Aasc&date=20260715 (Caused by NameResolutionError(\"HTTPSConnection(host='push2ex.eastmoney.com', port=443): Failed to resolve 'push2ex.eastmoney.com' ([Errno 8] nodename nor servname provided, or not known)\"))"}}, "newStocks": []};

// ---------- 工具 ----------
const fmt = (v, suf="") => v==null ? "—" : v + suf;
const pct = v => v==null ? "—" : (v*100).toFixed(1)+"%";
const delta = (cur, prev, inv) => {
  if (cur==null || prev==null) return "";
  const d = cur - prev; if (!d) return "";
  const up = d > 0;
  return `<span class="delta ${up?'up':'dn'}">${up?'▲':'▼'}${Math.abs(d).toFixed(1).replace(/\.0$/,'')}</span>`;
};

// ---------- 标题与周期 ----------
document.getElementById("phase").textContent = D.senti.phase || "";
document.getElementById("reason").innerHTML = (D.senti.reason||"").split(";").map(r=>"· "+r).join("<br>");

// ---------- 情绪卡片 ----------
const cards = [
  ["涨停", fmt(D.senti.zt,"家"), delta(D.senti.zt, D.prev.zt)],
  ["跌停", fmt(D.senti.dt,"家"), delta(D.senti.dt, D.prev.dt)],
  ["炸板率", pct(D.senti.zbRate), delta(D.senti.zbRate==null?null:D.senti.zbRate*100, D.prev.zbRate==null?null:D.prev.zbRate*100)],
  ["连板高度", fmt(D.senti.maxLb,"板"), delta(D.senti.maxLb, D.prev.maxLb)],
  ["两市成交", D.senti.amount==null?"缺失":(D.senti.amount/10000>=1?(D.senti.amount/10000).toFixed(2)+"万亿":D.senti.amount+"亿"), ""],
  ["昨涨停溢价", D.senti.prem==null?"—":D.senti.prem.toFixed(2)+"%", delta(D.senti.prem, D.prev.prem)],
  ["总晋级率", pct(D.senti.promo), ""],
  ["涨/跌家数", fmt(D.senti.up)+"/"+fmt(D.senti.down), ""],
];
document.getElementById("cards").innerHTML = cards.map(c=>
  `<div class="card"><div class="t">${c[0]}</div><div class="v">${c[1]}${c[2]}</div></div>`).join("");

// ---------- 近10日情绪趋势 ----------
function chart(id, opt){ try{ echarts.init(document.getElementById(id)).setOption(opt);}catch(e){
  document.getElementById(id).innerHTML = '<div class="note" style="padding:20px">图表加载失败(需联网加载 ECharts CDN)</div>';}}
chart("trend", {
  tooltip:{trigger:"axis"}, legend:{data:["涨停","跌停","炸板率%","连板高度"]},
  grid:{left:40,right:40,top:36,bottom:24},
  xAxis:{type:"category",data:D.hist.map(h=>h.d)},
  yAxis:[{type:"value",name:"家数"},{type:"value",name:"%/板",max:v=>Math.max(40,v.max)}],
  series:[
    {name:"涨停",type:"bar",data:D.hist.map(h=>h.zt),itemStyle:{color:"#d93025"}},
    {name:"跌停",type:"bar",data:D.hist.map(h=>h.dt),itemStyle:{color:"#1e8e3e"}},
    {name:"炸板率%",type:"line",yAxisIndex:1,data:D.hist.map(h=>h.zbRate),itemStyle:{color:"#f9ab00"}},
    {name:"连板高度",type:"line",yAxisIndex:1,data:D.hist.map(h=>h.maxLb),itemStyle:{color:"#4285f4"}},
  ]});

// ---------- 题材树状图 ----------
chart("themeChart", {
  tooltip:{formatter:p=>`${p.name}<br>涨停${p.value}家`},
  series:[{type:"treemap",roam:false,nodeClick:false,breadcrumb:{show:false},
    label:{formatter:p=>`${p.name}\n${p.value}家`},
    data:D.themes.slice(0,14).map(t=>({name:t.theme,value:t.zt}))}]});
document.getElementById("themeTable").innerHTML =
  "<tr><th>题材</th><th>涨停</th><th>炸板</th><th>总封单(亿)</th><th>最高板</th><th>连续活跃</th><th>阶段</th><th>龙头</th></tr>" +
  D.themes.slice(0,12).map(t=>`<tr><td>${t.theme}</td><td>${t.zt}</td><td>${t.zb}</td><td>${t.seal??"—"}</td><td>${t.maxlb}</td><td>${t.streak}天</td><td>${t.stage}</td><td>${t.leader}</td></tr>`).join("");

// ---------- 连板天梯 ----------
if (D.gaps.length) document.getElementById("gapWarn").innerHTML =
  `<div class="warn">⚠️ 梯队断层:${D.gaps.map(g=>g+"板").join("、")} 空缺——断层之上的票缺少后排对标,接力风险大</div>`;
document.getElementById("ladder").innerHTML = D.ladder.map(t=>{
  const chips = t.lb>=2
    ? t.stocks.map(s=>`<span class="stock-chip"><b>${s.name}</b> <span class="chip-sub">${s.theme} 封${s.seal??"—"}亿/占流通${s.stf}% ${s.open?("开"+s.open+"次"):"未开板"}</span></span>`).join("")
    : `<span class="note">${t.stocks.length}家(明细见附表)</span>`;
  return `<div class="ladder-tier"><div class="lb-badge ${t.lb<2?'low':''}">${t.lb}板<br><span style="font-size:11px">${t.stocks.length}家</span></div><div>${chips}</div></div>`;
}).join("");

// ---------- 晋级与溢价 ----------
const pd = D.senti.promoDetail||{};
document.getElementById("promoCards").innerHTML =
  Object.entries(pd).map(([k,v])=>`<div class="card"><div class="t">${k}</div><div class="v" style="font-size:18px">${v}</div></div>`).join("")
  || '<div class="note">无晋级数据</div>';

chart("premChart", {
  tooltip:{trigger:"axis"}, grid:{left:40,right:20,top:30,bottom:60},
  xAxis:{type:"category",data:perf.map(p=>p.name),axisLabel:{rotate:60,fontSize:10}},
  yAxis:{type:"value",name:"今日涨跌%"},
  series:[{type:"bar",data:perf.map(p=>({value:p.pct,itemStyle:{color:p.pct>=0?"#d93025":"#1e8e3e"}}))}]});

// ---------- 龙虎榜 ----------
document.getElementById("lhbTable").innerHTML = D.lhb.length
  ? "<tr><th>股票</th><th>连板</th><th>净买(亿)</th><th>知名买方</th><th>解读</th></tr>" +
    D.lhb.map(f=>`<tr><td>${f.name}</td><td>${f.lb||"—"}</td><td>${f.netBuy??"—"}</td><td>${f.buyers.map(b=>`<span class="tag">${b}</span>`).join("")||"—"}</td><td class="note">${f.interpret}</td></tr>`).join("")
  : "<tr><td class='note'>龙虎榜数据缺失(约17:00-18:30公布,可运行补充任务)</td></tr>";

  title:{text:"概念主力资金净流入/流出 TOP(亿)",left:"center",textStyle:{fontSize:13}},
  tooltip:{}, grid:{left:120,right:40,top:40,bottom:20},
  xAxis:{type:"value"}, yAxis:{type:"category",
    data:[...D.flowOut.slice().reverse(), ...D.flowIn].map(x=>x.name)},
  series:[{type:"bar",data:[...D.flowOut.slice().reverse(),...D.flowIn].map(x=>({value:x.v,itemStyle:{color:x.v>=0?"#d93025":"#1e8e3e"}}))}]});
else document.getElementById("flowChart").innerHTML='<div class="note" style="padding:16px">板块资金流数据缺失</div>';

// ---------- 明日关注 ----------
document.getElementById("watchTable").innerHTML =
  "<tr><th>标的</th><th>类型</th><th>观察点</th></tr>" +
  D.watch.map(w=>`<tr><td><b>${w.name}</b> ${w.code}</td><td><span class="tag">${w.tag}</span></td><td class="note">${w.note}</td></tr>`).join("");

// ---------- 附表(可排序) ----------
if (D.newStocks.length) document.getElementById("newStocks").innerHTML =
  "无涨跌幅限制新股(不计入统计):" + D.newStocks.map(n=>`${n.name} ${n.pct==null?"—":(n.pct>0?'+':'')+n.pct+'%'}`).join("、");

function sortable(id, cols, rows){
  const el = document.getElementById(id);
  let sortKey = null, asc = false;
  function render(){
    const data = sortKey ? rows.slice().sort((a,b)=>{
      const x=a[sortKey], y=b[sortKey];
      if(x==null) return 1; if(y==null) return -1;
      return (typeof x==="number" ? x-y : String(x).localeCompare(String(y))) * (asc?1:-1);
    }) : rows;
    el.innerHTML = "<tr>"+cols.map(c=>`<th data-k="${c[0]}">${c[1]}${sortKey===c[0]?(asc?" ▲":" ▼"):""}</th>`).join("")+"</tr>"
      + data.map(r=>"<tr>"+cols.map(c=>`<td>${r[c[0]]??"—"}</td>`).join("")+"</tr>").join("");
    el.querySelectorAll("th").forEach(th=>th.onclick=()=>{
      const k = th.dataset.k;
      if (sortKey===k) asc=!asc; else { sortKey=k; asc=false; }
      render();
    });
  }
  render();
}
sortable("ztTable", [["code","代码"],["name","名称"],["lb","连板"],["theme","题材"],["seal","封单(亿)"],["stf","封单/流通%"],["fst","首封"],["open","开板"],["turn","换手%"],["amt","成交(亿)"],["mv","流通(亿)"],["stat","涨停统计"]], D.ztRows);
sortable("zbTable", [["code","代码"],["name","名称"],["pct","收盘涨幅%"],["open","炸板次数"],["amp","振幅%"]], D.zbRows);
sortable("dtTable", [["code","代码"],["name","名称"],["consec","连续跌停"],["seal","封单(亿)"]], D.dtRows);

// ---------- 数据缺失 ----------
const miss = Object.entries(D.missing);
if (miss.length) document.getElementById("missing").innerHTML =
  '<div class="missing">数据完整性提示:' + miss.map(([k,v])=>`${k}(${v.status})`).join(";") + "</div>";
</script>
